<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CertiTrust | Home</title>
  <link rel="stylesheet" href="./css/main.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/a2d2706da3.js" crossorigin="anonymous"></script>
  <style>
    h2 span {
      background: linear-gradient(45deg, #00cec9, #f368e0);
      background-clip: text;
      -webkit-background-clip: text;
      -moz-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body style="background-color: #121212; color: white;">

  <!-- Simplified and Centered Branding -->
  <div class="container text-center mt-5">
    <h1 class="display-3 mb-3" style="font-size: 3.5rem;">
      <i class="fas fa-shield-alt"></i>
      <span class="navbar-brand">CertiTrust</span>
    </h1>
    <h2 class="mb-2" style="color: #555;">Welcome to <span>CertiTrust</span></h2>
    <p class="lead" style="color: #aaa;">Blockchain-powered certificate verification system</p>
  </div>

  <!-- Central Action Cards -->
  <div class="container home-cards d-flex flex-wrap justify-content-center gap-3 mt-4">
    <div class="home-card">
      <a href="upload.html">
        <i class="fas fa-upload fa-2x mb-2"></i>
        <div>Upload Certificate</div>
      </a>
    </div>
    <div class="home-card">
      <a href="verify.html">
        <i class="fas fa-check-circle fa-2x mb-2"></i>
        <div>Verify Certificate</div>
      </a>
    </div>
    <div class="home-card">
      <a href="delete.html">
        <i class="fas fa-trash-alt fa-2x mb-2"></i>
        <div>Delete Certificate</div>
      </a>
    </div>
    <div class="home-card">
      <a href="admin.html">
        <i class="fas fa-user-shield fa-2x mb-2"></i>
        <div>Admin Panel</div>
      </a>
    </div>
    <div class="home-card">
      <a href="about.html">
        <i class="fas fa-users fa-2x mb-2"></i>
        <div>Meet the Team</div>
      </a>
    </div>
  </div>
</body>
</html>
