<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CertiTrust | Upload Certificate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #121212;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 500px;
      margin-top: 80px;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.1);
    }

    h2 {
      color: #00c6ff;
      text-align: center;
    }

    .navbar-brand {
      font-size: 1.8rem;
      font-weight: bold;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      -webkit-background-clip: text;
      background-clip: text; /* ✅ Added for compatibility */
      -webkit-text-fill-color: transparent;
    }

    #connectWallet {
      width: 100%;
      margin-bottom: 10px;
      background: #f0ad4e;
      color: black;
      font-weight: bold;
      border: none;
    }

    #connectWallet:hover {
      background: #ec971f;
    }

    #uploadBtn {
      width: 100%;
      background: #28a745;
      border: none;
    }

    #uploadBtn:hover {
      background: #218838;
    }

    #uploadResult {
      margin-top: 15px;
      padding: 10px;
      border-radius: 5px;
      background: #2c2c2c;
      color: #fff;
    }

    a {
      color: #00c6ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="navbar-brand text-center">CertiTrust</h1>
    <h2>Upload Certificate</h2>
    <p class="text-center">Select a certificate file to upload and store it securely on the blockchain.</p>

    <button id="connectWallet" class="btn btn-warning">
      <i class="fa fa-link"></i> Connect Wallet
    </button>

    <input type="file" id="fileInput" class="form-control mb-2" />
    <button id="uploadBtn" class="btn btn-success">Upload to Blockchain</button>

    <div id="uploadResult"></div>
    <a href="index.html" class="d-block text-center mt-3">← Back to Home</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
  <script src="./js/upload.js"></script>
</body>
</html>
